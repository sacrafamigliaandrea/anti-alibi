<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anti-Alibi · Scuola Sacra Famiglia</title>
<style>
  :root {
    --blu: #143c8c;
    --blu-chiaro: #2563eb;
    --blu-soft: #e8eefc;
    --sfondo: #eef1f8;
    --testo: #142037;
    --grigio: #6b7693;
    --verde: #1d9d6b;
    --ambra: #f59e0b;
    --rosso: #d83a52;
    --ombra: 0 10px 30px rgba(20, 60, 140, 0.14);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--sfondo); color: var(--testo); line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  .app { height: 100vh; display: flex; flex-direction: column; }

  /* TOP BAR compatta */
  .topbar {
    flex: 0 0 auto; height: 60px; background: #fff; border-bottom: 2px solid var(--blu-soft);
    display: flex; align-items: center; gap: 16px; padding: 0 24px; box-shadow: 0 2px 10px rgba(20,60,140,.05);
  }
  .topbar img { height: 38px; }
  .topbar .tt { font-weight: 800; color: var(--blu); font-size: 17px; letter-spacing: -.3px; }
  .topbar .tt span { color: var(--grigio); font-weight: 500; font-size: 13px; }
  .topbar .spazio { flex: 1; }
  .nav-dots { display: flex; gap: 7px; align-items: center; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%; background: #cdd6ec; border: none; cursor: pointer;
    transition: transform .12s, background .2s; padding: 0;
  }
  .dot:hover { transform: scale(1.25); }
  .dot.fatto { background: var(--verde); }
  .dot.attivo { background: var(--blu-chiaro); box-shadow: 0 0 0 3px var(--blu-soft); }
  .conta-video { font-size: 13px; color: var(--grigio); font-weight: 600; margin-left: 8px; }

  /* CONTENUTO */
  .main { flex: 1 1 auto; min-height: 0; }

  /* ---- SCHERMATE INTRO / FINALE ---- */
  .centrata { height: 100%; display: flex; align-items: center; justify-content: center; padding: 30px; overflow-y: auto; }
  .pannello-intro {
    background: #fff; border-radius: var(--radius); box-shadow: var(--ombra);
    max-width: 760px; padding: 44px 50px; text-align: center;
  }
  .pannello-intro h1 { font-size: 38px; color: var(--blu); letter-spacing: -1px; margin-bottom: 16px; }
  .pannello-intro p { font-size: 18px; color: #3a4663; margin-bottom: 14px; }
  .frasi-alibi { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; margin: 22px 0 26px; }
  .frasi-alibi span {
    background: #fff7ed; color: #92400e; border: 1px dashed var(--ambra);
    padding: 7px 14px; border-radius: 999px; font-style: italic; font-size: 14px;
  }
  .fasi-spiega { display: flex; gap: 14px; justify-content: center; margin: 8px 0 28px; }
  .fasi-spiega .f { flex: 1; background: var(--blu-soft); border-radius: 12px; padding: 16px; text-align: left; }
  .fasi-spiega .f b { color: var(--blu); display: block; font-size: 15px; margin-bottom: 4px; }
  .fasi-spiega .f small { color: var(--grigio); font-size: 13px; }

  /* ---- PAGINA VIDEO (no scroll) ---- */
  .video-page { height: 100%; display: flex; gap: 22px; padding: 22px 24px; }
  .col-video {
    flex: 0 0 auto; height: 100%; aspect-ratio: 9 / 16; background: #0d1320; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .col-video video { height: 100%; width: 100%; object-fit: contain; border-radius: 6px; }

  .col-attivita {
    flex: 1 1 auto; min-width: 0; background: #fff; border-radius: var(--radius);
    box-shadow: var(--ombra); padding: 26px 34px; display: flex; flex-direction: column; min-height: 0;
  }
  .titolo-video { font-size: 21px; color: var(--blu); font-weight: 800; letter-spacing: -.3px; margin-bottom: 4px; }
  .sotto-video { font-size: 13px; color: var(--grigio); margin-bottom: 14px; }

  /* stepper fasi */
  .fasi { display: flex; gap: 6px; margin-bottom: 16px; }
  .fase-tab {
    flex: 1; text-align: center; font-size: 12px; font-weight: 700; color: var(--grigio);
    background: #f1f4fb; border: 2px solid transparent; border-radius: 10px; padding: 7px 4px; cursor: default;
  }
  .fase-tab .num { display: inline-block; width: 18px; height: 18px; line-height: 18px; border-radius: 50%;
    background: #cdd6ec; color: #fff; font-size: 11px; margin-right: 5px; }
  .fase-tab.attiva { color: var(--blu-chiaro); border-color: var(--blu-chiaro); background: var(--blu-soft); }
  .fase-tab.attiva .num { background: var(--blu-chiaro); }
  .fase-tab.fatta { color: var(--verde); }
  .fase-tab.fatta .num { background: var(--verde); }
  .fase-tab.cliccabile { cursor: pointer; }

  .domanda { font-size: 17px; font-weight: 700; color: var(--testo); margin-bottom: 10px; }
  .scaffold { background: #f6f8fd; border-radius: 11px; padding: 12px 14px; margin-bottom: 12px; }
  .scaffold .lab { font-size: 11.5px; font-weight: 800; color: var(--blu); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .scaffold ul { margin: 0 0 10px 0; padding-left: 18px; }
  .scaffold ul li { font-size: 13.5px; color: #3a4663; margin-bottom: 3px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: #fff; border: 1px solid #c8d3ee; color: var(--blu); font-size: 12.5px;
    padding: 6px 11px; border-radius: 999px; cursor: pointer; transition: background .15s, color .15s;
  }
  .chip:hover { background: var(--blu-chiaro); color: #fff; border-color: var(--blu-chiaro); }

  textarea {
    flex: 1 1 auto; min-height: 200px; width: 100%; border: 2px solid #c8d3ee; border-radius: 12px;
    padding: 16px 18px; font-family: inherit; font-size: 17px; line-height: 1.5; resize: none; color: var(--testo);
    background: #fff; margin-bottom: 8px;
  }
  textarea:focus { outline: none; border-color: var(--blu-chiaro); }

  .barra-stato { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; margin-bottom: 12px; min-height: 18px; }
  .conta { font-weight: 700; color: var(--grigio); }
  .conta.ok { color: var(--verde); }
  .feedback { color: var(--rosso); text-align: right; flex: 1; margin-left: 12px; }
  .feedback.ok { color: var(--verde); }

  .azioni { display: flex; gap: 10px; }
  button.btn { font-family: inherit; font-size: 15px; font-weight: 700; border: none; border-radius: 11px;
    padding: 12px 20px; cursor: pointer; transition: transform .1s, background .2s; }
  button.btn:active { transform: scale(.97); }
  .btn-primary { background: var(--blu-chiaro); color: #fff; flex: 1; }
  .btn-primary:hover { background: var(--blu); }
  .btn-primary:disabled { background: #c8d3ee; cursor: not-allowed; }
  .btn-ghost { background: #f1f4fb; color: var(--grigio); }
  .btn-ghost:hover { color: var(--blu); }

  .big { font-size: 17px; }
  .recap-box { text-align: left; max-height: 46vh; overflow-y: auto; margin: 8px 0 22px; }
  .recap-item { background: #f6f8fd; border-left: 4px solid var(--verde); border-radius: 9px; padding: 12px 16px; margin-bottom: 10px; }
  .recap-item .q { font-size: 12px; font-weight: 800; color: var(--blu); margin-bottom: 4px; }
  .recap-item .a { font-size: 14px; color: var(--testo); white-space: pre-wrap; }
  .nota-reset { font-size: 13px; color: var(--ambra); margin-bottom: 18px; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <img src="logo.jpg" alt="Scuola Sacra Famiglia" />
    <div class="tt">Anti-Alibi<br><span>Dalla scusa all'obiettivo Scuola</span></div>
    <div class="spazio"></div>
    <div class="nav-dots" id="navDots"></div>
    <div class="conta-video" id="contaVideo"></div>
  </div>

  <div class="main" id="main"></div>

</div>

<script>
/* ============================================================
   VIDEO — ospitati su Dropbox (link ?raw=1 per la riproduzione
   in pagina). Per aggiungere/cambiare un video basta modificare
   "src" qui sotto.
   ============================================================ */
const VIDEOS = [
  { titolo: "Lamentarsi o arrivare?",        sotto: "Chi vuole arrivare smette di cercare scuse.",
    src: "https://www.dropbox.com/scl/fi/yefqksoelurjqjfl20b5z/lamentarsi.mp4?rlkey=oto397mf7fh1qdopebicq1s8i&st=bl03scdc&raw=1" },
  { titolo: "Nessuno gli ha detto che era impossibile", sotto: "Spesso il limite ce lo mettiamo noi.",
    src: "https://www.dropbox.com/scl/fi/br7kvli0ca8snaulvgonu/impossibile.mp4?rlkey=4pkew7mw488v42uht3ykcndi3&st=ijjxflon&raw=1" },
  { titolo: "Velasco: saper giocare male",   sotto: "Anche quando va male, niente alibi: si rende lo stesso.",
    src: "https://www.dropbox.com/scl/fi/808nytrwd98ncf5q1ir4t/velasco.mp4?rlkey=l42bxjfszudl9vf9okc0rww04&st=18y3rotf&raw=1" },
  { titolo: "Fallisci solo se ti fermi",      sotto: "Cadere fa parte del percorso.",
    src: "https://www.dropbox.com/scl/fi/hqobdrkgbzrlbmmr28jwf/salto.mp4?rlkey=zpjdpzpai41hk6230yklfirfc&st=q3bdc4en&raw=1" },
  { titolo: "Non smettere di provarci",       sotto: "L'impegno totale, anche nelle piccole cose.",
    src: "https://www.dropbox.com/scl/fi/73rhbfkmz7m5qbjhntqr5/bambino.mp4?rlkey=xaiy0ecmxgrnu34pwg6idnsmh&st=e3m8uqfl&raw=1" },
  { titolo: "Disciplina, ossessione, focus",  sotto: "I risultati nascono da costanza e concentrazione.",
    src: "https://www.dropbox.com/scl/fi/zrkznomzz6tzls0wwfyf1/mappa.mp4?rlkey=c98qw2j6tmcumjgkubuudfsmj&st=qmhbgwqu&raw=1" },
  { titolo: "Phelps: la dedizione",           sotto: "Dietro ogni campione, anni di sacrificio invisibile.",
    src: "https://www.dropbox.com/scl/fi/q1exbz3bptfzidxrxno0s/phelps.mp4?rlkey=61tl782kvsytb524w8njqih86&st=ry4q1uqg&raw=1" },
  { titolo: "L'ossessione per ciò che conta", sotto: "Se un obiettivo ti sta a cuore, trovi l'energia ogni giorno.",
    src: "https://www.dropbox.com/scl/fi/ryg2qkenjyv1phvfhgzug/ossessione.mp4?rlkey=h35eudkfdli01tgw5fgmf2jrs&st=eylp1qbo&raw=1" },
  { titolo: "Portarlo al traguardo",          sotto: "A volte la vittoria più grande è aiutare un altro.",
    src: "https://www.dropbox.com/scl/fi/8bytzxqp5t259pv510nbq/corsa1.mp4?rlkey=rfj3v9n29lzmsaqvs27lsri7s&st=g5gvg5xe&raw=1" },
  { titolo: "La storia di Robson De Oliveira", sotto: "Conta più il gesto che il tempo sul cronometro.",
    src: "https://www.dropbox.com/scl/fi/u4n8h97ucd14lrnb8g0v7/corsa2.mp4?rlkey=ykq5bvmd5uu5i6bn35ja236lp&st=dx56hkit&raw=1" },
  { titolo: "La catena umana",                sotto: "Insieme si supera ciò che da soli sembrava impossibile.",
    src: "https://www.dropbox.com/scl/fi/pxv0ytnpdkpyuyiqiobj1/solidarieta.mp4?rlkey=25zrwl1w16jizw1dol74x6sr9&st=3dnkjn30&raw=1" }
];

/* ============================================================
   FASI METACOGNITIVE — scaffolding (domande-guida + frasi di avvio)
   ============================================================ */
const FASI = [
  {
    nome: "Che cosa dice",
    domanda: "Che cosa hai capito da questo video? Qual è il messaggio?",
    spunti: [
      "Che cosa succede / che cosa si vede nel video?",
      "Qual è la frase o l'immagine più importante?",
      "Che cosa vuole farci capire l'autore?"
    ],
    avvii: [
      "In questo video si vede che…",
      "Il messaggio principale è che…",
      "La parte che mi ha colpito di più è…",
      "Secondo me l'autore vuole dirci che…"
    ]
  },
  {
    nome: "E io?",
    domanda: "E a scuola? Quando ti è capitato di cercare un alibi o di mollare nello studio?",
    spunti: [
      "Pensa a una verifica, ai compiti o a una materia in cui hai pensato «tanto non ce la faccio».",
      "A chi o a che cosa hai dato la colpa? (il prof, la sfortuna, «non sono portato»…)",
      "Che cosa è successo poi? Come ti sei sentito?"
    ],
    avvii: [
      "A scuola mi è capitato che…",
      "In quella materia ho pensato «non sono capace» e così…",
      "Invece di studiare ho dato la colpa a…",
      "Quella volta mi sono sentito…"
    ]
  },
  {
    nome: "La mia mossa",
    domanda: "Trasforma tutto in energia per la scuola: qual è la tua mossa per la prossima difficoltà nello studio?",
    spunti: [
      "Pensa a una situazione precisa: una verifica, i compiti, una materia difficile.",
      "Scrivi la mossa nel formato «Quando… allora io…». Deve essere piccola e davvero fattibile.",
      "Dove metterai la tua energia e la tua concentrazione?"
    ],
    avvii: [
      "Quando avrò una verifica difficile, allora io…",
      "Quando non avrò voglia di studiare, allora io…",
      "La prossima volta che penserò «non ce la faccio», allora io…",
      "Per concentrarmi meglio sullo studio, da domani…"
    ]
  }
];

const MIN_CARATTERI = 150;

/* ============================================================
   STATO — solo in memoria: chiudendo/ricaricando si azzera tutto
   ============================================================ */
const progresso = VIDEOS.map(() => ({ faseMax: 0, fase: 0, risposte: ["", "", ""], completato: false }));
let videoCorrente = 0;
let schermata = "intro"; // intro | video | finale

const main = document.getElementById("main");

/* ---------- VALIDAZIONE ANTI-NONSENSE ---------- */
function validaTesto(raw) {
  const t = raw.trim();
  if (t.length < MIN_CARATTERI)
    return { ok: false, msg: `Mancano ${MIN_CARATTERI - t.length} caratteri (min. ${MIN_CARATTERI}).` };
  const parole = t.split(/\s+/).filter(w => w.length > 0);
  if (parole.length < 20)
    return { ok: false, msg: "Scrivi frasi più articolate (almeno ~20 parole)." };
  const senzaSpazi = t.replace(/\s/g, "");
  // carattere singolo ripetuto (es. "aaaaaa")
  const freq = {};
  for (const c of senzaSpazi.toLowerCase()) freq[c] = (freq[c] || 0) + 1;
  if (Math.max(...Object.values(freq)) / senzaSpazi.length > 0.4)
    return { ok: false, msg: "Troppi caratteri ripetuti: scrivi un commento vero." };
  // proporzione di vocali (testo italiano sensato ne ha molte)
  const vocali = (t.match(/[aeiouàèéìòù]/gi) || []).length;
  if (vocali / senzaSpazi.length < 0.25)
    return { ok: false, msg: "Non sembra un testo sensato: usa parole vere e le frasi-guida." };
  // varietà di parole (evita "ok ok ok ok")
  const uniche = new Set(parole.map(w => w.toLowerCase().replace(/[^a-zàèéìòù]/gi, "")));
  if (uniche.size / parole.length < 0.4)
    return { ok: false, msg: "Stai ripetendo le stesse parole: sviluppa meglio il pensiero." };
  // lunghezza media plausibile (no blob senza spazi / no lettere isolate)
  const media = senzaSpazi.length / parole.length;
  if (media > 13) return { ok: false, msg: "Controlla gli spazi tra le parole." };
  if (media < 2)  return { ok: false, msg: "Usa parole complete, non lettere sparse." };
  return { ok: true, msg: "Riflessione valida ✓" };
}

/* ---------- RENDER ---------- */
function renderTop() {
  const dots = document.getElementById("navDots");
  const conta = document.getElementById("contaVideo");
  if (schermata !== "video") { dots.innerHTML = ""; conta.textContent = ""; return; }
  dots.innerHTML = "";
  VIDEOS.forEach((v, i) => {
    const b = document.createElement("button");
    b.className = "dot" + (progresso[i].completato ? " fatto" : "") + (i === videoCorrente ? " attivo" : "");
    b.title = v.titolo;
    b.onclick = () => { videoCorrente = i; renderVideo(); };
    dots.appendChild(b);
  });
  conta.textContent = `${videoCorrente + 1} / ${VIDEOS.length}`;
}

function renderIntro() {
  schermata = "intro";
  renderTop();
  main.innerHTML = `
    <div class="centrata">
      <div class="pannello-intro">
        <h1>Anti-Alibi</h1>
        <p class="big" style="color:var(--blu);font-weight:700;">Che cos'è la <b>cultura dell'alibi</b>?</p>
        <p>È l'abitudine di dare sempre la colpa <b>fuori da te</b>: «il prof spiega male», «la verifica era
        troppo difficile», «non sono portato». L'alibi ti consola per un attimo, ma ti tiene fermo:
        se la colpa è sempre di qualcun altro, allora <b>tu non puoi cambiare niente</b>.</p>
        <p>L'allenatore <b>Julio Velasco</b> lo dice ai suoi atleti: i campioni non cercano alibi. Quando arriva
        una palla storta non si lamentano — fanno comunque del loro meglio. <b>A scuola è uguale.</b></p>
        <div class="frasi-alibi">
          <span>"il prof spiega male"</span><span>"la verifica era troppo difficile"</span>
          <span>"non sono portato"</span><span>"non ce la faccio"</span><span>"tanto è inutile"</span>
        </div>
        <p>Per ogni video farai un piccolo percorso in <b>3 passi</b>, fino a una mossa concreta per la <b>scuola</b>:</p>
        <div class="fasi-spiega">
          <div class="f"><b>1 · Che cosa dice</b><small>Qual è il messaggio del video?</small></div>
          <div class="f"><b>2 · E io?</b><small>Quando mi è capitato nello studio?</small></div>
          <div class="f"><b>3 · La mia mossa</b><small>Come trasformo tutto in energia per la scuola?</small></div>
        </div>
        <button class="btn btn-primary big" style="flex:none;padding:14px 34px;" onclick="iniziaPercorso()">Inizia →</button>
      </div>
    </div>`;
}

function renderVideo() {
  schermata = "video";
  renderTop();
  const v = VIDEOS[videoCorrente];
  const p = progresso[videoCorrente];
  const fase = p.fase;
  const f = FASI[fase];
  const ultimaFase = fase === FASI.length - 1;
  const ultimoVideo = videoCorrente === VIDEOS.length - 1;

  const tabs = FASI.map((ff, i) => {
    const stato = i < p.faseMax ? "fatta" : (i === fase ? "attiva" : "");
    const cliccabile = i <= p.faseMax ? " cliccabile" : "";
    return `<div class="fase-tab ${stato}${cliccabile}" ${i <= p.faseMax ? `onclick="vaiAFase(${i})"` : ""}>
      <span class="num">${i < p.faseMax ? "✓" : i + 1}</span>${ff.nome}</div>`;
  }).join("");

  const chips = f.avvii.map(a => `<span class="chip" onclick="inserisciAvvio(this)">${a}</span>`).join("");
  const spunti = f.spunti.map(s => `<li>${s}</li>`).join("");

  main.innerHTML = `
    <div class="video-page">
      <div class="col-video">
        <video controls preload="metadata" playsinline src="${v.src}"></video>
      </div>
      <div class="col-attivita">
        <div class="titolo-video">${v.titolo}</div>
        <div class="sotto-video">${v.sotto}</div>
        <div class="fasi">${tabs}</div>
        <div class="domanda">${f.domanda}</div>
        <div class="scaffold">
          <div class="lab">Per aiutarti</div>
          <ul>${spunti}</ul>
          <div class="chips">${chips}</div>
        </div>
        <textarea id="ta" placeholder="Scrivi qui la tua riflessione. Usa le frasi-guida per iniziare…">${p.risposte[fase]}</textarea>
        <div class="barra-stato">
          <span class="conta" id="conta"></span>
          <span class="feedback" id="feedback"></span>
        </div>
        <div class="azioni">
          ${fase > 0 ? `<button class="btn btn-ghost" onclick="vaiAFase(${fase - 1})">← Indietro</button>` : ""}
          <button class="btn btn-primary" id="btnAvanti" disabled>
            ${ultimaFase ? (ultimoVideo ? "Concludi 🏁" : "Prossimo video →") : "Avanti →"}
          </button>
        </div>
      </div>
    </div>`;

  const ta = document.getElementById("ta");
  const aggiorna = () => {
    p.risposte[fase] = ta.value;
    const res = validaTesto(ta.value);
    const len = ta.value.trim().length;
    const conta = document.getElementById("conta");
    const fb = document.getElementById("feedback");
    conta.textContent = `${len} / ${MIN_CARATTERI}`;
    conta.classList.toggle("ok", res.ok);
    fb.textContent = res.msg || "";
    fb.classList.toggle("ok", res.ok);
    document.getElementById("btnAvanti").disabled = !res.ok;
  };
  ta.addEventListener("input", aggiorna);
  document.getElementById("btnAvanti").onclick = () => avanti();
  aggiorna();
  ta.focus();
}

function renderFinale() {
  schermata = "finale";
  renderTop();
  const items = [];
  VIDEOS.forEach((v, i) => {
    progresso[i].risposte.forEach((r, fi) => {
      if (r && r.trim().length >= MIN_CARATTERI)
        items.push(`<div class="recap-item"><div class="q">${v.titolo} · ${FASI[fi].nome}</div><div class="a">${escapeHtml(r.trim())}</div></div>`);
    });
  });
  main.innerHTML = `
    <div class="centrata">
      <div class="pannello-intro">
        <h1>Bravo! Hai lavorato sul serio 💪</h1>
        <p class="big">Hai trasformato dei video in riflessioni tue. Queste sono le tue parole di oggi.</p>
        <div class="nota-reset">⚠️ Chiudendo l'app le riflessioni si cancellano: stampale o annotale ora se ti servono.</div>
        <div class="recap-box">${items.length ? items.join("") : "<p>Nessuna riflessione completata.</p>"}</div>
        <div class="azioni" style="justify-content:center;">
          <button class="btn btn-ghost" onclick="window.print()">🖨️ Stampa</button>
          <button class="btn btn-primary" style="flex:none;padding:12px 28px;" onclick="renderVideo()">Torna ai video</button>
        </div>
      </div>
    </div>`;
}

/* ---------- AZIONI ---------- */
function iniziaPercorso() { videoCorrente = 0; renderVideo(); }

function inserisciAvvio(elChip) {
  const ta = document.getElementById("ta");
  const testo = elChip.textContent;
  const sep = ta.value.trim().length === 0 ? "" : (/\s$/.test(ta.value) ? "" : " ");
  ta.value = ta.value + sep + testo + " ";
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  ta.dispatchEvent(new Event("input"));
}

function vaiAFase(i) {
  const p = progresso[videoCorrente];
  if (i <= p.faseMax) { p.fase = i; renderVideo(); }
}

function avanti() {
  const p = progresso[videoCorrente];
  const res = validaTesto(p.risposte[p.fase] || "");
  if (!res.ok) return;
  if (p.fase < FASI.length - 1) {
    p.faseMax = Math.max(p.faseMax, p.fase + 1);
    p.fase += 1;
    renderVideo();
  } else {
    p.completato = true;
    if (videoCorrente < VIDEOS.length - 1) { videoCorrente += 1; renderVideo(); }
    else { renderFinale(); }
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* AVVIO */
renderIntro();
</script>
